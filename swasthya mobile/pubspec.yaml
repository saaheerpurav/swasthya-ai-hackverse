name: swasthya_ai
description: SwasthyaAI - Multilingual AI public health platform

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # HTTP
  dio: ^5.4.0
  http: ^1.2.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.0

  # Maps & location (flutter_map = OSM, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^12.0.0

  # Audio
  record: ^5.1.0
  just_audio: ^0.9.0

  # Image
  image_picker: ^1.0.0
  flutter_image_compress: ^2.1.0
  cached_network_image: ^3.3.0

  # Notifications
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0

  # Web (for CORS-safe image on web)
  web: ^0.5.0

  # UI utilities
  google_fonts: ^6.2.0
  lottie: ^3.1.0
  url_launcher: ^6.2.0
  flutter_markdown: ^0.7.0

  # Data
  intl: 0.19.0
  path_provider: ^2.1.0

dependency_overrides:
  record_platform_interface: 1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
